version: 2

models:
  - name: dim_products
    description: "A clean, dimensional table of products with categorized pricing."
    columns:
      - name: product_id
        description: "The primary key for this table."
        tests:
          - unique
          - not_null
      - name: price_category
        description: "Categorized pricing tiers."
        tests:
          - accepted_values:
              arguments:
                values: ['Budget', 'Mid-Range', 'Premium']